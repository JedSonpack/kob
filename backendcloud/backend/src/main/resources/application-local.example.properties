# 复制本文件为 application-local.properties（已被 .gitignore 忽略）并填入真实值。
# 生成密钥见 docs/architecture/secret-rotation-runbook.md

kob.db.password=<运行 openssl rand -base64 18 生成>
kob.jwt.secret=<运行 openssl rand -base64 48 生成>

