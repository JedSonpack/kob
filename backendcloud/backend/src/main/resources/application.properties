server.port=3000

# dev 默认启用 local profile（application-local.properties 提供本地密钥）；
# 生产须以 SPRING_PROFILES_ACTIVE=prod 覆盖，并通过环境变量提供密钥。
spring.profiles.active=local

# 数据源：真实凭据由 local profile 或环境变量提供，禁止入库。
spring.datasource.url=${kob.db.url:jdbc:mysql://localhost:3306/kob?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8}
spring.datasource.username=${kob.db.username:root}
spring.datasource.password=${kob.db.password:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT：密钥由 local profile 或环境变量 KOB_JWT_SECRET 提供；未配置时启动失败（见 JwtUtil#validate）。TTL 默认 14 天。
kob.jwt.secret=${KOB_JWT_SECRET:}
kob.jwt.ttl-millis=${KOB_JWT_TTL_MILLIS:1209600000}

# Agent Lab 评测调用（阶段 3）：调用本地 botsys /bot/evaluate/，独立超时；P95 合格阈值 100ms
kob.agent.evaluation.base-url=http://127.0.0.1:3002
kob.agent.evaluation.connect-timeout-ms=5000
kob.agent.evaluation.read-timeout-ms=130000
kob.agent.evaluation.max-p95-ms=100

# Agent Lab LLM（阶段 3）：默认 fake；真实模型可选 openai-compatible 或 anthropic-messages
kob.agent.llm.provider=fake
kob.agent.llm.base-url=${KOB_AGENT_LLM_BASE_URL:https://api.openai.com}
kob.agent.llm.path=${KOB_AGENT_LLM_PATH:/v1/chat/completions}
kob.agent.llm.anthropic-path=${KOB_AGENT_LLM_PATH:/v1/messages}
kob.agent.llm.model=${KOB_AGENT_LLM_MODEL:}
kob.agent.llm.api-key=${KOB_AGENT_LLM_API_KEY:}
kob.agent.llm.max-tokens=${KOB_AGENT_LLM_MAX_TOKENS:4096}
kob.agent.llm.anthropic-version=${KOB_AGENT_LLM_ANTHROPIC_VERSION:2023-06-01}
kob.agent.llm.connect-timeout-ms=5000
kob.agent.llm.read-timeout-ms=60000
