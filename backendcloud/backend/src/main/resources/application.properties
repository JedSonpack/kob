server.port=3000

# dev 默认启用 local profile（application-local.properties 提供本地密钥）；
# 生产须以 SPRING_PROFILES_ACTIVE=prod 覆盖，并通过环境变量提供密钥。
spring.profiles.active=local

# 数据源：真实凭据由 local profile 或环境变量提供，禁止入库。
spring.datasource.url=${kob.db.url:jdbc:mysql://localhost:3306/kob?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8}
spring.datasource.username=${kob.db.username:root}
spring.datasource.password=${kob.db.password:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT：密钥由 local profile 或环境变量 KOB_JWT_SECRET 提供；未配置时启动失败（见 JwtUtil#validate）。TTL 默认 14 天。
kob.jwt.secret=${KOB_JWT_SECRET:}
kob.jwt.ttl-millis=${KOB_JWT_TTL_MILLIS:1209600000}
